type: http
name: Get order status and fulfillment details
url: '{{baseUrl}}/orders/:orderId'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: orderId
    value: d49433e6-039d-cbae-c33b-4c61416610eb
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "id": "97e751ee-947c-4e85-0ce3-d6a45c2b1bbf",
            "customerId": "string",
            "sourceSystem": "string",
            "orderDate": "1972-10-25",
            "currency": "string",
            "status": "reserved",
            "totalAmount": 4717.677397498532,
            "lineItems": [
              {
                "sku": "string",
                "quantity": 1089,
                "unitPrice": 4371.377998549526,
                "warehouseCode": "string"
              },
              {
                "sku": "string",
                "quantity": 6645,
                "unitPrice": 5218.292129120335,
                "warehouseCode": "string"
              }
            ],
            "shipments": [
              {
                "shipmentId": "b99060fa-712e-fdc3-8039-bb8582a52bae",
                "carrier": "string",
                "shipFrom": "string",
                "trackingReference": "string",
                "status": "delivered"
              },
              {
                "shipmentId": "9f107d53-076a-beb8-e6ec-3bc5a37ab285",
                "carrier": "string",
                "shipFrom": "string",
                "trackingReference": "string",
                "status": "packed"
              }
            ]
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Order details
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: json
        content: |-
          {
            "error": "string",
            "message": "string",
            "statusCode": 890
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Order not found
