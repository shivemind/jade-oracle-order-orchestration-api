type: http
name: Create an ERP order for downstream fulfillment
url: '{{baseUrl}}/orders'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "customerId": "string",
      "orderDate": "1946-12-21",
      "currency": "USD",
      "lineItems": [
        {
          "sku": "string",
          "quantity": 6022,
          "unitPrice": 6847.463074837692,
          "warehouseCode": "string"
        }
      ],
      "sourceSystem": "salesforce"
    }
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "id": "bb3744be-828a-c24a-af0b-95922611f96d",
            "customerId": "string",
            "sourceSystem": "string",
            "orderDate": "1988-02-20",
            "currency": "string",
            "status": "cancelled",
            "totalAmount": 3846.182867133485,
            "lineItems": [
              {
                "sku": "string",
                "quantity": 4238,
                "unitPrice": 4918.7588925491045,
                "warehouseCode": "string"
              },
              {
                "sku": "string",
                "quantity": 8498,
                "unitPrice": 719.8458976006017,
                "warehouseCode": "string"
              }
            ],
            "shipments": [
              {
                "shipmentId": "996fea34-8a24-e108-ad79-3918210a7002",
                "carrier": "string",
                "shipFrom": "string",
                "trackingReference": "string",
                "status": "packed"
              },
              {
                "shipmentId": "405ed4d2-7523-c01f-f6eb-e847dc872882",
                "carrier": "string",
                "shipFrom": "string",
                "trackingReference": "string",
                "status": "shipped"
              }
            ]
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Order created
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: json
        content: |-
          {
            "error": "string",
            "message": "string",
            "statusCode": 4192
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Invalid request
