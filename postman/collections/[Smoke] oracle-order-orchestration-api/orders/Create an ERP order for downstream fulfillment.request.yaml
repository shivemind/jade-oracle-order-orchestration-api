type: http
name: Create an ERP order for downstream fulfillment
url: '{{baseUrl}}/orders'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "customerId": "string",
      "orderDate": "1999-02-02",
      "currency": "USD",
      "lineItems": [
        {
          "sku": "string",
          "quantity": 3271,
          "unitPrice": 4411.525739118947,
          "warehouseCode": "string"
        }
      ],
      "sourceSystem": "salesforce"
    }
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "id": "308f6ed7-9433-da05-efdd-cabdf8129051",
            "customerId": "string",
            "sourceSystem": "string",
            "orderDate": "1950-04-13",
            "currency": "string",
            "status": "draft",
            "totalAmount": 6747.577884509233,
            "lineItems": [
              {
                "sku": "string",
                "quantity": 7227,
                "unitPrice": 7439.1612784243425,
                "warehouseCode": "string"
              },
              {
                "sku": "string",
                "quantity": 6012,
                "unitPrice": 8176.886513109765,
                "warehouseCode": "string"
              }
            ],
            "shipments": [
              {
                "shipmentId": "701d6663-8d42-1509-cf57-af006e6ba0ee",
                "carrier": "string",
                "shipFrom": "string",
                "trackingReference": "string",
                "status": "shipped"
              },
              {
                "shipmentId": "6fd27361-82a0-6a08-111d-5685ea7f2fef",
                "carrier": "string",
                "shipFrom": "string",
                "trackingReference": "string",
                "status": "created"
              }
            ]
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Order created
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: json
        content: |-
          {
            "error": "string",
            "message": "string",
            "statusCode": 1145
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Invalid request
