type: http
name: Create an ERP order for downstream fulfillment
url: '{{baseUrl}}/orders'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "customerId": "string",
      "orderDate": "1953-01-20",
      "currency": "USD",
      "lineItems": [
        {
          "sku": "string",
          "quantity": 7402,
          "unitPrice": 2023.185927029434,
          "warehouseCode": "string"
        }
      ],
      "sourceSystem": "salesforce"
    }
