type: http
name: Create an ERP order for downstream fulfillment
url: '{{baseUrl}}/orders'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "customerId": "string",
      "orderDate": "1974-09-10",
      "currency": "USD",
      "lineItems": [
        {
          "sku": "string",
          "quantity": 7747,
          "unitPrice": 376.76275260094985,
          "warehouseCode": "string"
        }
      ],
      "sourceSystem": "salesforce"
    }
