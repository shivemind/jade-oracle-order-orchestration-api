type: http
name: Create an ERP order for downstream fulfillment
url: '{{baseUrl}}/orders'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "customerId": "string",
      "orderDate": "1962-07-16",
      "currency": "USD",
      "lineItems": [
        {
          "sku": "string",
          "quantity": 8678,
          "unitPrice": 9681.28531230581,
          "warehouseCode": "string"
        }
      ],
      "sourceSystem": "salesforce"
    }
