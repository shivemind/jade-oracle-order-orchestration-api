type: http
name: Reserve inventory for a confirmed order
url: '{{baseUrl}}/orders/:orderId/reserve-inventory'
method: POST
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: orderId
    value: 72560007-4399-20d6-a6bb-f2b4b2c70ffb
examples:
  - response:
      statusCode: 202
      statusText: Accepted
      body:
        type: json
        content: |-
          {
            "actionId": "303b2581-53e6-2832-47c6-c7a48304765d",
            "orderId": "fe2b9001-fdb7-c9d7-5378-d7307acc0a2a",
            "status": "queued",
            "message": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Inventory reservation requested
  - response:
      statusCode: 409
      statusText: Conflict
      body:
        type: json
        content: |-
          {
            "error": "string",
            "message": "string",
            "statusCode": 3316
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Inventory cannot be reserved
