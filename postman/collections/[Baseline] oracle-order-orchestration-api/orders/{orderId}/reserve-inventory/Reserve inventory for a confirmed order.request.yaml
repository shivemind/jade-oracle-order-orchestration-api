type: http
name: Reserve inventory for a confirmed order
url: '{{baseUrl}}/orders/:orderId/reserve-inventory'
method: POST
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: orderId
    value: 10a6a851-227e-f42f-18d4-7c906c847bd9
examples:
  - response:
      statusCode: 202
      statusText: Accepted
      body:
        type: json
        content: |-
          {
            "actionId": "50bb4f84-bc3b-d457-e8d9-8882c566c74e",
            "orderId": "f4d89048-aa9b-1172-9c56-3e1fae6f6414",
            "status": "failed",
            "message": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Inventory reservation requested
  - response:
      statusCode: 409
      statusText: Conflict
      body:
        type: json
        content: |-
          {
            "error": "string",
            "message": "string",
            "statusCode": 7033
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Inventory cannot be reserved
