type: http
name: Create a shipment for a reserved order
url: '{{baseUrl}}/orders/:orderId/shipments'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
pathVariables:
  - key: orderId
    value: 10a6a851-227e-f42f-18d4-7c906c847bd9
body:
  type: json
  content: |-
    {
      "carrier": "string",
      "shipFrom": "string",
      "trackingReference": "string"
    }
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "shipmentId": "ea909999-6194-a3a0-f305-5d186ed1fb36",
            "carrier": "string",
            "shipFrom": "string",
            "trackingReference": "string",
            "status": "packed"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Shipment created
