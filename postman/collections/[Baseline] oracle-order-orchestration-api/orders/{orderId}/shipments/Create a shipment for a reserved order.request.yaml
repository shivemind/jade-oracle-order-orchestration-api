type: http
name: Create a shipment for a reserved order
url: '{{baseUrl}}/orders/:orderId/shipments'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
pathVariables:
  - key: orderId
    value: 72560007-4399-20d6-a6bb-f2b4b2c70ffb
body:
  type: json
  content: |-
    {
      "carrier": "string",
      "shipFrom": "string",
      "trackingReference": "string"
    }
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "shipmentId": "bfd159c7-a4fa-6f2d-ca3b-e702615101cd",
            "carrier": "string",
            "shipFrom": "string",
            "trackingReference": "string",
            "status": "shipped"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Shipment created
