type: http
name: Create a shipment for a reserved order
url: '{{baseUrl}}/orders/:orderId/shipments'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
pathVariables:
  - key: orderId
    value: b1ab071f-1f7a-8db2-487a-b91b1e081cdf
body:
  type: json
  content: |-
    {
      "carrier": "string",
      "shipFrom": "string",
      "trackingReference": "string"
    }
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "shipmentId": "90a939bb-bd6a-fa54-1e92-d91994c3a05a",
            "carrier": "string",
            "shipFrom": "string",
            "trackingReference": "string",
            "status": "shipped"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Shipment created
